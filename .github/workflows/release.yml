name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    # Windows runner: the Chocolatey pipe needs the `choco` CLI (Windows-only).
    # GoReleaser still cross-compiles the Linux/macOS binaries and generates the
    # Homebrew formula from here.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub release and uploads archives/checksums.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SSH private key for the write-enabled deploy key on
          # glholland/homebrew-tap (formula push over git/SSH).
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          # Chocolatey Community Repository API key (package push).
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
