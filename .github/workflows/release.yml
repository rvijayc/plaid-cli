name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux   GOARCH=amd64 go build -o dist/plaid-cli-linux-amd64       .
          GOOS=linux   GOARCH=arm64 go build -o dist/plaid-cli-linux-arm64       .
          GOOS=darwin  GOARCH=amd64 go build -o dist/plaid-cli-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64 go build -o dist/plaid-cli-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -o dist/plaid-cli-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -o dist/plaid-cli-windows-arm64.exe .

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/plaid-cli-linux-amd64 \
            dist/plaid-cli-linux-arm64 \
            dist/plaid-cli-darwin-amd64 \
            dist/plaid-cli-darwin-arm64 \
            dist/plaid-cli-windows-amd64.exe \
            dist/plaid-cli-windows-arm64.exe
