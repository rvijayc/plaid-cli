name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  # Required for keyless cosign signing via GitHub Actions OIDC.
  id-token: write

jobs:
  release:
    name: Build & Release
    # Windows runner: the Chocolatey pipe needs the `choco` CLI (Windows-only).
    # GoReleaser still cross-compiles the Linux/macOS binaries and generates the
    # Homebrew formula from here.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub release and uploads archives/checksums.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SSH private key for the write-enabled deploy key on
          # glholland/homebrew-tap (formula push over git/SSH).
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      # Push the packed .nupkg separately and non-blockingly. The Chocolatey
      # Community Repository moderates submissions and returns 403 when a prior
      # version is still under review, so a failure here must not fail the
      # release — the GitHub release, SBOMs, signature, and Homebrew formula are
      # already published by this point.
      - name: Push Chocolatey package
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $pkgs = Get-ChildItem -Path dist -Recurse -Filter *.nupkg
          if (-not $pkgs) {
            Write-Host "No .nupkg found under dist/; nothing to push."
            exit 0
          }
          foreach ($p in $pkgs) {
            Write-Host "Pushing $($p.FullName)"
            choco push $p.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          }
